version: '3.8'

services:
  # PostgreSQL - база данных
  postgres:
    image: postgres:15-alpine
    container_name: uniquer_postgres
    restart: always
    environment:
      POSTGRES_DB: uniquer_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uniquer_secret_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - uniquer_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - кэш и брокер для Celery
  redis:
    image: redis:7-alpine
    container_name: uniquer_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - uniquer_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Telegram бот
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uniquer_bot
    restart: always
    env_file:
      - .env.docker
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - uniquer_network
    command: python -m bot.main

  # Celery воркер для обработки видео
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: uniquer_celery_worker
    restart: always
    env_file:
      - .env.docker
    volumes:
      - ./storage:/app/storage
    depends_on:
      - postgres
      - redis
      - bot
    networks:
      - uniquer_network

  # Celery beat для периодических задач
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: uniquer_celery_beat
    restart: always
    env_file:
      - .env.docker
    depends_on:
      - postgres
      - redis
    networks:
      - uniquer_network
    command: celery -A worker.celery beat --loglevel=info

networks:
  uniquer_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
